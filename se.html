<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>네이버 검색</title>
  <style>
    :root {
      --accent: #03c75a;
      --accent-dark: #02b150;
      --accent-glow: rgba(3, 199, 90, 0.10);
      --accent-focus: rgba(3, 199, 90, 0.20);
      --mark-shadow: rgba(3, 199, 90, 0.26);
      --text: #111827;
      --muted: #6b7280;
      --surface: #ffffff;
      --surface-strong: #f8fafc;
      --line: #d1d5db;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.10);
      font-family:
        -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI",
        sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f9fafb;
        --muted: #9ca3af;
        --surface: #101318;
        --surface-strong: #171b22;
        --line: #2e3440;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top, var(--accent-glow), transparent 34rem),
        var(--surface);
    }

    body[data-engine="google"] {
      --accent: #4285f4;
      --accent-dark: #3367d6;
      --accent-glow: rgba(66, 133, 244, 0.10);
      --accent-focus: rgba(66, 133, 244, 0.20);
      --mark-shadow: rgba(66, 133, 244, 0.22);
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 24px;
    }

    .search-shell {
      width: min(100%, 640px);
      align-self: center;
      justify-self: center;
      display: grid;
      gap: 32px;
      transform: translateY(-5vh);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 0;
      padding: 0;
      color: var(--accent);
      background: transparent;
      font: inherit;
      cursor: pointer;
      user-select: none;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--accent);
      color: #ffffff;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 14px 28px var(--mark-shadow);
      transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .brand:hover .brand-mark,
    .brand:focus-visible .brand-mark {
      transform: translateY(-1px);
    }

    .brand:focus-visible {
      outline: 3px solid var(--accent-focus);
      outline-offset: 10px;
      border-radius: 18px;
    }

    .brand-word {
      font-size: clamp(42px, 12vw, 76px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: 0;
    }

    .brand-word span {
      transition: color 160ms ease;
    }

    body[data-engine="google"] .brand-mark {
      background: var(--surface);
      color: #4285f4;
      border: 1px solid var(--line);
    }

    .search-form {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      min-height: 64px;
      border: 2px solid transparent;
      border-radius: 999px;
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .search-form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 18px 56px var(--accent-focus);
      transform: translateY(-1px);
    }

    .search-icon {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      margin-left: 24px;
      color: var(--accent);
    }

    input[type="search"] {
      width: 100%;
      min-width: 0;
      height: 60px;
      border: 0;
      outline: 0;
      padding: 0 12px 0 14px;
      color: var(--text);
      background: transparent;
      font: inherit;
      font-size: 20px;
    }

    input[type="search"]::placeholder {
      color: var(--muted);
    }

    input[type="search"]::-webkit-search-decoration,
    input[type="search"]::-webkit-search-cancel-button {
      display: none;
    }

    button {
      flex: 0 0 auto;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .clear-button,
    .submit-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      margin-right: 10px;
    }

    .clear-button {
      color: var(--muted);
      background: transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, background 140ms ease;
    }

    .clear-button.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .clear-button:hover {
      background: rgba(107, 114, 128, 0.12);
    }

    .submit-button {
      color: #ffffff;
      background: var(--accent);
      transition: background 140ms ease, transform 140ms ease;
    }

    .submit-button:hover {
      background: var(--accent-dark);
      transform: scale(1.03);
    }

    .submit-button:active {
      transform: scale(0.98);
    }

    .button-icon {
      width: 22px;
      height: 22px;
    }

    .fine-print {
      justify-self: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 520px) {
      main {
        padding: 20px;
      }

      .search-shell {
        gap: 26px;
        transform: translateY(-7vh);
      }

      .brand {
        gap: 9px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        font-size: 28px;
      }

      .search-form {
        min-height: 58px;
      }

      .search-icon {
        width: 24px;
        height: 24px;
        margin-left: 20px;
      }

      input[type="search"] {
        height: 54px;
        font-size: 18px;
      }

      .clear-button,
      .submit-button {
        width: 40px;
        height: 40px;
        margin-right: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="search-shell" aria-label="검색">
      <button class="brand" type="button" aria-label="구글 검색 모드로 전환" title="구글 검색 모드로 전환">
        <div class="brand-mark" aria-hidden="true">N</div>
        <div class="brand-word" aria-hidden="true">NAVER</div>
      </button>

      <form class="search-form" action="https://search.naver.com/search.naver" method="get" role="search">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <input id="query" name="query" type="search" autocomplete="off" autofocus placeholder="검색어를 입력하세요" aria-label="검색어">
        <button class="clear-button" type="button" aria-label="검색어 지우기" title="지우기">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m7 7 10 10M17 7 7 17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="submit-button" type="submit" aria-label="검색" title="검색">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m5 12 14 0m-6-6 6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </section>

    <div class="fine-print">search.naver.com</div>
  </main>

  <script>
    const form = document.querySelector(".search-form");
    const input = document.querySelector("#query");
    const clearButton = document.querySelector(".clear-button");
    const brandButton = document.querySelector(".brand");
    const brandMark = document.querySelector(".brand-mark");
    const brandWord = document.querySelector(".brand-word");
    const finePrint = document.querySelector(".fine-print");

    const engines = {
      naver: {
        action: "https://search.naver.com/search.naver",
        brandLabel: "NAVER",
        mark: "N",
        name: "query",
        nextLabel: "구글 검색 모드로 전환",
        placeholder: "네이버에서 검색",
        title: "네이버 검색",
        domain: "search.naver.com"
      },
      google: {
        action: "https://www.google.com/search",
        brandLabel: '<span style="color:#4285f4">G</span><span style="color:#ea4335">o</span><span style="color:#fbbc05">o</span><span style="color:#4285f4">g</span><span style="color:#34a853">l</span><span style="color:#ea4335">e</span>',
        mark: "G",
        name: "q",
        nextLabel: "네이버 검색 모드로 전환",
        placeholder: "Google에서 검색",
        title: "구글 검색",
        domain: "google.com"
      }
    };

    let currentEngine = "naver";

    function applyEngine(engineName) {
      const engine = engines[engineName];

      currentEngine = engineName;
      document.body.dataset.engine = engineName;
      document.title = engine.title;
      form.action = engine.action;
      input.name = engine.name;
      input.placeholder = engine.placeholder;
      brandMark.textContent = engine.mark;
      brandWord.innerHTML = engine.brandLabel;
      brandButton.setAttribute("aria-label", engine.nextLabel);
      brandButton.title = engine.nextLabel;
      finePrint.textContent = engine.domain;
    }

    function updateClearButton() {
      clearButton.classList.toggle("is-visible", input.value.length > 0);
    }

    input.addEventListener("input", updateClearButton);

    clearButton.addEventListener("click", () => {
      input.value = "";
      input.focus();
      updateClearButton();
    });

    brandButton.addEventListener("click", () => {
      applyEngine(currentEngine === "naver" ? "google" : "naver");
      input.focus();
    });

    form.addEventListener("submit", (event) => {
      input.value = input.value.trim();

      if (!input.value) {
        event.preventDefault();
        input.focus();
      }
    });

    applyEngine(currentEngine);
    updateClearButton();
  </script>
</body>
</html>
