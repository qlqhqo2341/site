<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>페이지 목록</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <header>
        <h1>페이지 목록</h1>
        <span class="pill">navigation</span>
    </header>

    <main class="app">
        <ul id="nav-ul"></ul>
    </main>

    <script>
        const navItems = (() => {
            function it(href, label) {
                return { href, label: label || href };
            }
            
            return [
                it("run-pace"),
                it("speical-char-title", "special-char-title"),
                it("homelab"),
                it("se", "간단검색"),
            ]
        })();

        document.addEventListener("DOMContentLoaded", () => {
            const navList = document.getElementById("nav-ul");

            navItems.forEach(({ href, label }) => {
                const li = document.createElement("li");
                const link = document.createElement("a");

                link.href = href;
                link.textContent = label;
                link.dataset.status = "checking";

                li.appendChild(link);
                navList.appendChild(li);

                checkLink(link);
            });

            async function checkLink(link) {
                try {
                    let response = await fetch(link.href, {
                        method: "HEAD",
                        cache: "no-store",
                    });

                    if (response.status === 405) {
                        response = await fetch(link.href, {
                            method: "GET",
                            cache: "no-store",
                        });
                    }

                    link.dataset.status = response.ok ? "ok" : "error";
                } catch {
                    link.dataset.status = "error";
                }
            }
        });
    </script>
</body>
</html>
