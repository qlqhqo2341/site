<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>페이지 목록</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <header>
        <h1>페이지 목록</h1>
        <span class="pill">navigation</span>
    </header>

    <main class="app">
        <ul id="nav-ul"></ul>
    </main>

    <script src="common.js"></script>
    <script>
        const navItems = (() => {
            function it(href, label) {
                return { href, label: label || href };
            }
            
            return [
                it("run-pace"),
                it("speical-char-title", "special-char-title"),
                it("homelab"),
                it("se", "간단검색"),
            ]
        })();

        document.addEventListener("DOMContentLoaded", () => {
            SiteLinks.renderNavList(document.getElementById("nav-ul"), navItems);
        });
    </script>
</body>
</html>
