<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>정적 호스팅</title>
    <style>
        :root {
            color-scheme: light dark;
            --page-text: #1f1a14;
            --page-bg: #f6f1e8;
            --body-bg: linear-gradient(180deg, #f6f1e8 0%, #fffdf8 100%);
            --heading-text: #776143;
            --card-border: #dfd4c2;
            --card-bg: #fffdf9;
            --card-hover-border: #bca06e;
            --card-hover-bg: #fff8eb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-text: #f1e9db;
                --page-bg: #19140f;
                --body-bg: linear-gradient(180deg, #19140f 0%, #241c15 100%);
                --heading-text: #d6b98f;
                --card-border: #4a3b2d;
                --card-bg: #241c15;
                --card-hover-border: #d0a96d;
                --card-hover-bg: #302419;
            }
        }

        html {
            background: var(--page-bg);
            color: var(--page-text);
        }

        body {
            width: min(32rem, calc(100% - 3rem));
            margin: 0 auto;
            padding: 3rem 0 4rem;
            min-height: 100vh;
            color: var(--page-text);
            background: var(--body-bg);
            font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
        }

        h3 {
            margin: 0 0 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--heading-text);
        }

        #nav-ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 0.75rem;
        }

        #nav-ul a {
            display: block;
            padding: 0.9rem 1rem;
            border: 1px solid var(--card-border);
            border-radius: 0.9rem;
            color: inherit;
            background: var(--card-bg);
            text-decoration: none;
            box-shadow: none;
            transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease;
        }

        #nav-ul a:hover {
            transform: translateY(-1px);
            border-color: var(--card-hover-border);
            background: var(--card-hover-bg);
        }
    </style>
</head>
<body>

    <h3>navigation</h3>
    
    <ul id="nav-ul"></ul>
    <script>
        const navItems = (() => {
            function it(href, label) {
                return { href, label: label || href };
            }
            
            return [
                it("run-pace"),
                it("speical-char-title", "special-char-title"),
                it("today-note"),
            ]
        })();

        document.addEventListener("DOMContentLoaded", () => {
            const navList = document.getElementById("nav-ul");

            navItems.forEach(({ href, label }) => {
                const li = document.createElement("li");
                const link = document.createElement("a");

                link.href = href;
                link.textContent = label;

                li.appendChild(link);
                navList.appendChild(li);
            });
        });
    </script>
</body>
</html>
