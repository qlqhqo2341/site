<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>오늘 일지 이동</title>
<style>
  /* 기본 스타일 (라이트모드) */
  :root {
    --bg-color: #ffffff;
    --text-color: #222222;
    --link-color: #0066cc;
  }

  /* 시스템 다크모드 감지 */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-color: #1a1a1a;
      --text-color: #e0e0e0;
      --link-color: #4db8ff;
    }
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }

  a {
    color: var(--link-color);
    text-decoration: none;
    word-break: break-all;
    font-size: 0.9rem;
  }

  a:hover {
    text-decoration: underline;
  }

  #status {
    font-weight: bold;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<p id="status">오늘 일지로 이동 중...</p>
<p><a id="fallbackLink" href="/">이동이 안 되면 이 링크를 클릭하세요.</a></p>

<script>
(function () {
  const now = new Date();
  const yy = String(now.getFullYear()).slice(-2);
  const mm = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");
  
  // 파일명 및 URL 구성
  const dateStr = yy + mm + dd;
  const fileName = dateStr + "_%EC%9D%BC%EC%A7%80.md";
  const targetUrl =
    "https://git.jhan.me/jeonghan-yee/obsidian-git/src/branch/main/z_daily/" +
    fileName;

  const fallbackLink = document.getElementById("fallbackLink");
  const status = document.getElementById("status");

  // UI 업데이트
  fallbackLink.href = targetUrl;
  fallbackLink.textContent = targetUrl;
  status.textContent = "오늘 일지로 이동합니다: " + dateStr;

  // 리다이렉트 실행
  window.location.replace(targetUrl);
}());
</script>
</body>
</html>
