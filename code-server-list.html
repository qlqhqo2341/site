<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>code-server 리스트</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <header>
        <h1>code-server 리스트</h1>
        <span class="pill">services</span>
    </header>

    <main class="app">
        <ul id="nav-ul"></ul>
    </main>

    <script src="common.js"></script>
    <script>
        const navItems = (() => {
            function it(domain, label) {
                return {
                    href: SiteLinks.normalizeHref(domain),
                    label: label || domain,
                };
            }

            return [
                it("https://code-mbp16.jhan.me", "code-server mbp16"),
                it("https://code-air-book.jhan.me", "code-server air-book"),
            ];
        })();

        document.addEventListener("DOMContentLoaded", () => {
            SiteLinks.renderNavList(document.getElementById("nav-ul"), navItems);
        });
    </script>
</body>
</html>
