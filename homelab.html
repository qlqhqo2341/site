<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>홈랩</title>
    <style>
        :root {
            --bg: #0b0f14;
            --panel: #121821;
            --ink: #eaf2ff;
            --muted: #9fb3d1;
            --accent: #5aa9ff;
            --border: #223042;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #0b0f14, #0e141c 40%, #0b0f14);
            color: var(--ink);
            font-family: ui-sans-serif, -apple-system, "Segoe UI", Pretendard, system-ui, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            line-height: 1.45;
            padding: 24px;
        }

        header {
            max-width: 980px;
            margin: 0 auto 18px auto;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 20px;
        }

        .pill {
            background: #0b111a;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            font-size: 12px;
            padding: 6px 10px;
        }

        .app {
            max-width: 980px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            padding: 20px;
        }

        #nav-ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 14px;
        }

        #nav-ul li {
            grid-column: span 12;
        }

        @media (min-width: 800px) {
            #nav-ul li {
                grid-column: span 4;
            }
        }

        #nav-ul a {
            display: flex;
            min-height: 68px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #0f1520;
            color: inherit;
            text-decoration: none;
            font-size: 16px;
            font-weight: 650;
            transition: transform .15s, border-color .15s, background-color .15s;
        }

        #nav-ul a::after {
            content: "";
            width: 10px;
            height: 10px;
            flex: 0 0 10px;
            border-radius: 50%;
            background: var(--muted);
            box-shadow: 0 0 0 3px rgba(159, 179, 209, .12);
        }

        #nav-ul a:hover,
        #nav-ul a:focus-visible {
            transform: translateY(-1px);
            border-color: var(--accent);
            background: #0b111a;
            outline: none;
        }

        #nav-ul a[data-status="ok"]::after {
            background: #66e0a3;
            box-shadow: 0 0 0 3px rgba(102, 224, 163, .14);
        }

        #nav-ul a[data-status="error"]::after {
            background: #ff5f6d;
            box-shadow: 0 0 0 3px rgba(255, 95, 109, .14);
        }
    </style>
</head>
<body>
    <header>
        <h1>홈랩</h1>
        <span class="pill">services</span>
    </header>

    <main class="app">
        <ul id="nav-ul"></ul>
    </main>

    <script>
        const navItems = (() => {
            function it(domain, label) {
                return {
                    href: normalizeHref(domain),
                    label: label || domain,
                };
            }

            return [
                it("https://jhan.me/admin", "blog (admin page)"),
                it("https://site.jhan.me", "Site"),
                it("https://git.jhan.me", "Git"),
                it("https://bitwarden.jhan.me", "Bitwarden"),
                it("https://nas.jhan.me", "Synology nas"),
                it("https://n8n.jhan.me", "n8n"),
                it("https://windmill.jhan.me", "Windmill"),
            ];
        })();

        document.addEventListener("DOMContentLoaded", () => {
            const navList = document.getElementById("nav-ul");

            navItems.forEach(({ href, label }) => {
                const li = document.createElement("li");
                const link = document.createElement("a");

                link.href = href;
                link.textContent = label;
                link.dataset.status = "checking";
                link.rel = "noopener";

                li.appendChild(link);
                navList.appendChild(li);

                checkLink(link);
            });

            async function checkLink(link) {
                try {
                    let response = await fetch(link.href, {
                        method: "HEAD",
                        cache: "no-store",
                    });

                    if (response.status === 405) {
                        response = await fetch(link.href, {
                            method: "GET",
                            cache: "no-store",
                        });
                    }

                    link.dataset.status = response.ok ? "ok" : "error";
                } catch {
                    try {
                        await fetch(link.href, {
                            method: "HEAD",
                            mode: "no-cors",
                            cache: "no-store",
                        });

                        link.dataset.status = "ok";
                    } catch {
                        link.dataset.status = "error";
                    }
                }
            }
        });

        function normalizeHref(value) {
            const href = String(value).trim();

            if (/^(https?:)?\/\//i.test(href)) {
                return href;
            }

            return `https://${href}`;
        }
    </script>
</body>
</html>
