<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>홈랩</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <header>
        <h1>홈랩</h1>
        <span class="pill">services</span>
    </header>

    <main class="app">
        <ul id="nav-ul"></ul>
    </main>

    <script src="common.js"></script>
    <script>
        const navItems = (() => {
            function it(domain, label) {
                return {
                    href: SiteLinks.normalizeHref(domain),
                    label: label || domain,
                };
            }

            return [
                it("https://jhan.me/admin", "blog (admin page)"),
                it("https://pages.jhan.me", "Pages"),
                it("https://git.jhan.me", "Git"),
                it("https://bitwarden.jhan.me", "Bitwarden"),
                it("https://nas.jhan.me", "Synology nas"),
                it("https://n8n.jhan.me", "n8n"),
                it("https://windmill.jhan.me", "Windmill"),
            ];
        })();

        document.addEventListener("DOMContentLoaded", () => {
            SiteLinks.renderNavList(document.getElementById("nav-ul"), navItems);
        });
    </script>
</body>
</html>
